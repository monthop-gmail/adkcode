services:
  adkcode:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
      - ./.env:/app/adkcode/.env:ro
      - ./plugins:/app/adkcode/plugins:ro
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-}
      - ADKCODE_API_PASSWORD=${ADKCODE_API_PASSWORD:-}
      - ADKCODE_PROMPT_TIMEOUT_MS=${ADKCODE_PROMPT_TIMEOUT_MS:-120000}
    restart: unless-stopped
